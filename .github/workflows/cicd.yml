name: ShopZone CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # FRONTEND
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shop-frontend ./frontend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shop-frontend

      # ADMIN
      - name: Build Admin Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shop-admin ./admin

      - name: Push Admin Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shop-admin

      # BACKEND
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shop-backend ./backend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shop-backend

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/shop-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/shop-admin
            docker pull ${{ secrets.DOCKER_USERNAME }}/shop-backend

            docker stop frontend-container || true
            docker rm frontend-container || true

            docker stop admin-container || true
            docker rm admin-container || true

            docker stop backend-container || true
            docker rm backend-container || true

            docker run -d -p 8080:80 --name frontend-container \
            ${{ secrets.DOCKER_USERNAME }}/shop-frontend

            docker run -d -p 3001:80 --name admin-container \
            ${{ secrets.DOCKER_USERNAME }}/shop-admin

            docker run -d -p 5050:5050 \
            --env-file ~/shopZone/backend/.env \
            --name backend-container \
            ${{ secrets.DOCKER_USERNAME }}/shop-backend
